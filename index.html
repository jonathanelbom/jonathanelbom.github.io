
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, maximum-scale=1"
        />
        <title>Jonathan Elbom - Craft meets Code</title>
        <link rel="stylesheet" href="css/styles-0.min.css" />
        <link rel="stylesheet" href="css/styles-1.min.css" />
        <link rel="stylesheet" href="css/styles.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Host+Grotesk:ital,wght@0,300..800;1,300..800&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <div id="content">
            <div class="Portfolio">
                <header class="Portfolio__header">
                    <div class="Portfolio__header-content">
                        <div class="Portfolio__header-content-top">
                            <img class="Portfolio__header-image" src="./images/jonathan-avatar.png" />
                            <div>    
                                <h1>Jonathan Elbom</h1>
                                <h2>Craft meets Code</h2>
                            </div>
                        </div>
                        <p>
                            Design intuition paired with engineering depth - an eye for motion, interaction, and the details that matter.
                        </p>
                    </div>
                </header>
                <main class="Portfolio__toc">
                    <div class="Portfolio__wrapper">
                        <ul class="Portfolio__section" id="projects-list">
                            <p style="font-size: 18px; text-align: center; margin-block-end: 8px">Side projects where craft and code meet in practice.</p>
                            <div style="display: flex; justify-content: center; gap:8px; margin-block-start: 8px">
                                <div><a href="https://github.com/jonathanelbom" target="_blank">github.com/jonathanelbom</a></div>
                                |
                                <div><a href="https://github.com/mentalmodeler" target="_blank">github.com/mentalmodeler</a></div>
                            </div>
                            
                            <hr/>
                        </ul>
                    </div>
                </main>
            </div>
        </div>
        <script type="text/javascript">
            !(function () {
                var projects = [
                    {
                        image: './images/bedtime.png',
                        title: 'Bedtime',
                        tech: 'Nuxt4 | OpenAI API | Tailwind CSS',
                        description: 'An AI rhythm-section consultant for bedroom music makers - you describe a vibe and the AI streams back personalized production guidance for drums, bass, keys, guitar, and more.',
                        links: [
                            { label: 'Launch Bedtime', url: 'https://bedtime-zeta.vercel.app/', italic: false },
                            { label: 'View source on github', url: 'https://github.com/jonathanelbom/bedtime', italic: true }
                        ]
                    },
                    {
                        image: './images/mental-modeler.png',
                        title: 'Mental Modeler',
                        tech: 'React + Redux | LESS CSS | Embeddable JS API',
                        description: 'Interactive concept mapping tool using fuzzy logic to model complex relationships and ideas. Built with a professor collaborator to explore nuanced reasoning.',
                        links: [
                            { label: 'Launch Mental Modeler', url: 'https://mentalmodeler.github.io/mentalmodeler-js/', italic: false },
                            { label: 'View source on github', url: 'https://github.com/mentalmodeler', italic: true }
                        ]
                    },
                    {
                        image: './images/psu-focos.png',
                        title: 'PSU Focos',
                        tech: 'React | Material UI | SASS',
                        description: 'A UX prototype for exploring scenario outcomes - tweak model inputs as strategies and compare how the changes ripple across nodes.',
                        links: [
                            { label: 'Launch PSU Focus flow prototype', url: 'https://jonathanelbom.github.io/psu-focos/', italic: false },
                            { label: 'View source on github', url: 'https://github.com/jonathanelbom/psu-focos', italic: true }
                        ]
                    },
                    {
                        image: './images/dotz.png',
                        title: 'Dotz',
                        tech: 'Vanilla JS | CSS GPU Acceleration | OOP Entity System',
                        description: 'Smash falling dots for points in this retro-inspired tap game. Quick, addictive mobile gameplay.',
                        links: [
                            { label: 'Launch Dotz', url: 'https://jonathanelbom.github.io/dotz/', italic: false },
                            { label: 'View source on github', url: 'https://github.com/jonathanelbom/dotz', italic: true }
                        ]
                    },
                    {
                        image: './images/factor-that.png',
                        title: 'FactorTHAT',
                        tech: 'React | Next.js | SASS',
                        description: 'A drag-and-drop prime factorization tree - drop prime tokens onto any number to split it and reveal its factors step by step.',
                        links: [
                            { label: 'Launch FactorTHAT', url: 'https://jonathanelbom.github.io/factoring/', italic: false },
                            { label: 'View source on github', url: 'https://github.com/jonathanelbom/factoring', italic: true }
                        ]
                    },
                    {
                        image: './images/friday-night-jamz.png',
                        title: 'Friday Night Jamz',
                        tech: 'jQuery | Wavesurfer.js | Bootstrap',
                        description: 'Browse an archive of original Friday night jam sessions - stream any track with a live waveform, on mobile or desktop.',
                        links: [
                            { label: 'Launch Friday Night Jamz', url: 'https://jonathanelbom.github.io/fridaynightjamz/', italic: false },
                            { label: 'View source on github', url: 'https://github.com/jonathanelbom/fridaynightjamz', italic: true }
                        ]
                    },
                    {
                        image: './images/countdown.png',
                        title: 'Countdown Timer',
                        tech: 'Next.js | React | SCSS',
                        description: 'Set and watch a custom countdown clock with smooth interactions and visual feedback as time ticks away.',
                        links: [
                            { label: 'Launch Countdown Timer', url: 'https://jonathanelbom.github.io/countdown-timer/', italic: false },
                            { label: 'View source on github', url: 'https://github.com/jonathanelbom/countdown-timer', italic: true }
                        ]
                    },
                    {
                        image: './images/search.png',
                        title: 'Search',
                        tech: 'React | Next.js | SASS',
                        description: 'A keyboard-triggered search prompt with animated transitions - type to filter and sort results, all with polished motion design.',
                        links: [
                            { label: 'Launch Search demo', url: 'https://jonathanelbom.github.io/ux-demo/', italic: false },
                            { label: 'View source on github', url: 'https://github.com/jonathanelbom/ux-demo', italic: true }
                        ]
                    }
                ];

                function renderProjects(projectList) {
                    return projectList.map(function(p, i) {
                        var linksHtml = p.links.map(function(link) {
                            var label = link.italic ? `<i>${link.label}</i>` : link.label;
                            return `<a href="${link.url}" target="_blank">${label}</a>`;
                        }).join('\n');
                        return `${i > 0 ? '<hr />' : ''}<li>
  <img class="Portfolio__header-image" src="${p.image}" />
  <div>
    <div class="Portfolio__section__title">${p.title}</div>
    ${p.tech ? `<div class="Portfolio__section__tech">${p.tech}</div>` : ''}
    <div>${p.description}</div>
    <div class="Portfolio__section__links">
      ${linksHtml}
    </div>
  </div>
</li>`;
                    }).join('\n');
                }

                var projectsList = document.getElementById('projects-list');
                projectsList.innerHTML += renderProjects(projects);

                var wrapper = document.querySelector(".Portfolio__wrapper");
                var header = document.querySelector(".Portfolio__header");
                var headerContent = document.querySelector(
                    ".Portfolio__header-content"
                );
                var maxScroll = 300;
                window.addEventListener("scroll", function (e) {
                    var scrollTop = document.documentElement.scrollTop;
                    headerContent.style.transform = `translateY(${
                        scrollTop >= 0 ? -scrollTop * 0.35 : 0
                    }px)`;
                    var hasScrolled = wrapper.classList.contains("scrolled");
                    if (scrollTop > 0 && !hasScrolled) {
                        wrapper.classList.add("scrolled");
                    } else if (scrollTop <= 0 && hasScrolled) {
                        wrapper.classList.remove("scrolled");
                    }
                });
            })();
        </script>
    </body>
</html>
